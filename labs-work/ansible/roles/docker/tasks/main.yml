---
- name: Install Docker
  tags:
    - docker_install
    - docker
  block:
    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: "{{ docker_gpg_url }}"
        dest: "{{ docker_gpg_key_path }}"
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "{{ docker_repo }}"
        state: present
        filename: docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true
      notify: Restart docker
  rescue:
    - name: Wait before retrying Docker installation
      ansible.builtin.pause:
        seconds: 10

    - name: Retry apt update
      ansible.builtin.apt:
        update_cache: true

    - name: Retry Docker package installation
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
      notify: Restart docker
  always:
    - name: Ensure Docker service is started and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

- name: Configure Docker
  tags:
    - docker_config
    - docker
  block:
    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ docker_user }}"
        groups: docker
        append: true

    - name: Install python3-docker package
      ansible.builtin.apt:
        name: python3-docker
        state: present

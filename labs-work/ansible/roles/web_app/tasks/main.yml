---
- name: Include wipe tasks
  ansible.builtin.include_tasks:
    file: wipe.yml
    apply:
      tags:
        - web_app_wipe
  tags:
    - web_app_wipe

- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
  no_log: true
  tags:
    - app_deploy
    - compose

- name: Deploy application with Docker Compose
  tags:
    - app_deploy
    - compose
  block:
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: "0755"

    - name: Template docker-compose.yml
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Deploy application via Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        pull: always

    - name: Wait for application port to be available
      ansible.builtin.wait_for:
        port: "{{ app_port }}"
        delay: 5
        timeout: 30

    - name: Health check
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}/health"
        return_content: true
        status_code: 200
      register: health_result
      retries: 3
      delay: 5
      until: health_result.status == 200
  rescue:
    - name: Log deployment failure
      ansible.builtin.debug:
        msg: "Deployment failed for {{ app_name }}"

    - name: Show Docker Compose logs
      ansible.builtin.command:
        cmd: docker compose logs --tail=50
        chdir: "{{ compose_project_dir }}"
      register: compose_logs
      changed_when: false
      ignore_errors: true

    - name: Display compose logs
      ansible.builtin.debug:
        var: compose_logs.stdout_lines
      when: compose_logs is defined

    - name: Fail with deployment error
      ansible.builtin.fail:
        msg: "Application deployment failed. Check compose logs above."
